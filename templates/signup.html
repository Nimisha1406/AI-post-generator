{% extends "base.html" %}


{% block content %}


<div class="row justify-content-center">


    <div class="col-md-5">


        <div class="card shadow-lg border-0 rounded-4">


            <div class="card-body p-5">


                <h2 class="text-center fw-bold mb-4">

                    Create Account

                </h2>




                <div class="mb-3">

                    <input id="username" type="text" class="form-control form-control-lg" placeholder="Username">

                </div>




                <div class="mb-3">

                    <input id="email" type="email" class="form-control form-control-lg" placeholder="Email">

                </div>




                <div class="mb-3">

                    <input id="password" type="password" class="form-control form-control-lg" placeholder="Password">

                </div>




                <button onclick="signup()" class="btn btn-primary btn-lg w-100 rounded-3">

                    Signup

                </button>

                <div id="message" class="mt-3"></div>


                <hr class="my-4">




                <p class="text-center mb-0">

                    Already have an account?

                    <a href="/login" class="fw-bold text-primary text-decoration-none">

                        Login

                    </a>

                </p>



            </div>


        </div>


    </div>


</div>




<script src="{{ url_for(
'static',
filename='js/auth.js'
) }}"></script>


{% endblock %}
