{% extends "base.html" %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height:80vh;">

    <div class="card shadow-lg border-0 rounded-4" style="width:420px;">

        <div class="card-body p-5">

            <h2 class="text-center fw-bold mb-3">
                Forgot Password
            </h2>

            <p class="text-muted text-center mb-4">
                Enter your email address and we will send you a password reset OTP.
            </p>

            <div id="message" class="mb-3"></div>

            <div class="mb-3">

                <label class="form-label fw-semibold">
                    Email Address
                </label>

                <input id="forgot_email" type="email" class="form-control form-control-lg rounded-3"
                    placeholder="Enter your email">

            </div>

            <button onclick="forgotPassword()" class="btn btn-primary w-100 btn-lg rounded-3">

                Send OTP

            </button>

            <div class="text-center mt-4">

                <a href="/login" class="text-decoration-none">

                    Back to Login

                </a>

            </div>

        </div>

    </div>

</div>

<script src="{{ url_for(
'static',
filename='js/auth.js'
) }}"></script>

{% endblock %}
