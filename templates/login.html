{% extends "base.html" %}


{% block content %}


<div class="row justify-content-center">


    <div class="col-md-5">


        <div class="card shadow-lg border-0 rounded-4">


            <div class="card-body p-5">

                <div id="message"></div>

                <h2 class="text-center fw-bold mb-4">

                    Login

                </h2>



                <div class="mb-3">

                    <input id="login_email" type="email" class="form-control form-control-lg" placeholder="Email">

                </div>



                <div class="mb-3">

                    <input id="login_password" type="password" class="form-control form-control-lg"
                        placeholder="Password">

                </div>



                <button onclick="login()" class="btn btn-primary btn-lg w-100 rounded-3">

                    Login

                </button>



                <div class="text-center mt-3">

                    <a href="/forgot-password" class="text-decoration-none">

                        Forgot Password?

                    </a>

                </div>



                <hr class="my-4">



                <p class="text-center mb-0">

                    Don't have an account?

                    <a href="/signup" class="fw-bold text-primary text-decoration-none">

                        Signup

                    </a>

                </p>


            </div>


        </div>


    </div>


</div>



<script src="{{ url_for(
'static',
filename='js/auth.js'
) }}"></script>


{% endblock %}
