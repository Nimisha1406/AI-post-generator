{% extends "base.html" %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height:80vh;">

    <div class="card shadow-lg border-0 rounded-4" style="width:420px;">

        <div class="card-body p-5">

            <h2 class="text-center fw-bold mb-3">
                Reset Password
            </h2>

            <p class="text-muted text-center mb-4">
                Enter the OTP sent to your email and create a new password.
            </p>

            <div id="message" class="mb-3"></div>

            <div class="mb-3">

                <label class="form-label fw-semibold">
                    OTP
                </label>

                <input id="reset_otp" class="form-control form-control-lg rounded-3" placeholder="Enter OTP">

            </div>

            <div class="mb-4">

                <label class="form-label fw-semibold">
                    New Password
                </label>

                <input id="new_password" type="password" class="form-control form-control-lg rounded-3"
                    placeholder="Enter new password">

            </div>

            <button onclick="resetPassword()" class="btn btn-success w-100 btn-lg rounded-3">

                Reset Password

            </button>

            <div class="text-center mt-4">

                <a href="/login" class="text-decoration-none">

                    Back to Login

                </a>

            </div>

        </div>

    </div>

</div>

<script src="{{ url_for(
'static',
filename='js/auth.js'
) }}"></script>


{% endblock %}
