<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>
        AI Post Generator
    </title>


    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>


<body class="bg-light" style="visibility:hidden;">


    <!-- Navbar -->

    <nav id="main-navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow" style="visibility:hidden;">

        <div class="container">


            <a class="navbar-brand fw-bold" href="/">

                AI Post Generator

            </a>



            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>



            <div class="collapse navbar-collapse" id="navbarNav">


                <ul class="navbar-nav ms-auto">


                    <li class="nav-item">

                        <a id="login-link" class="nav-link" href="/login">

                            Login

                        </a>

                    </li>



                    <li class="nav-item">

                        <a id="signup-link" class="nav-link" href="/signup">

                            Signup

                        </a>

                    </li>



                    <li class="nav-item">

                        <a id="dashboard-link" class="nav-link" href="/dashboard">

                            Dashboard

                        </a>

                    </li>



                    <li class="nav-item">

                        <a id="logout-link" class="nav-link" href="#" onclick="logout()">

                            Logout

                        </a>

                    </li>


                </ul>


            </div>


        </div>


    </nav>



    <div class="container mt-5">


        {% block content %}

        {% endblock %}


    </div>




    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth_guard.js') }}"></script>
    
</body>


</html>
